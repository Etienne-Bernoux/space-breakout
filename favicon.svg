<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond spatial -->
  <rect width="32" height="32" rx="4" fill="#0a0a1a"/>
  <!-- Étoiles -->
  <circle cx="5" cy="6" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="27" cy="4" r="0.6" fill="#fff" opacity="0.4"/>
  <circle cx="12" cy="28" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="25" cy="24" r="0.5" fill="#fff" opacity="0.3"/>
  <!-- Drone (balle lumineuse) -->
  <circle cx="16" cy="10" r="3.5" fill="#00d4ff"/>
  <circle cx="16" cy="10" r="2" fill="#aaeeff"/>
  <!-- Traînée drone -->
  <line x1="16" y1="13.5" x2="16" y2="19" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Vaisseau (raquette sci-fi) -->
  <rect x="7" y="22" width="18" height="4" rx="2" fill="#1a3a5c"/>
  <rect x="9" y="22.5" width="14" height="3" rx="1.5" fill="#2a5a8c"/>
  <!-- Réacteurs -->
  <rect x="8" y="26" width="3" height="2" rx="0.5" fill="#ff6600"/>
  <rect x="21" y="26" width="3" height="2" rx="0.5" fill="#ff6600"/>
  <!-- Lumière cockpit -->
  <circle cx="16" cy="23.5" r="1.2" fill="#00d4ff" opacity="0.8"/>
</svg>
